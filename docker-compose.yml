services:
  app:
    build:
      context: .
      args:
        - DATABASE_URL=${DATABASE_URL}
        - OPENAI_API_KEY=${OPENAI_API_KEY}
        - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
        - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
        - PORT=${PORT:-8787}
    restart: always
    env_file: .env
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: ${PORT:-8787}
